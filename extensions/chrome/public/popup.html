<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 360px;
    min-height: 400px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f;
    color: #fff;
    font-size: 13px;
  }

  /* Header */
  .header {
    background: #1a1a2e;
    padding: 14px 16px;
    border-bottom: 1px solid #2a2a4a;
  }
  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: #a855f7;
  }
  .header-sub {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
  }

  /* Status bar */
  .status-bar {
    background: #1a1a2e;
    padding: 10px 16px;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ef4444;
  }
  .status-dot.connected { background: #22c55e; }
  .status-dot.warning { background: #f59e0b; }
  .status-text { font-size: 12px; color: #888; flex: 1; }
  .status-time { font-size: 10px; color: #555; }

  /* Sections */
  .section {
    padding: 12px 16px;
    border-bottom: 1px solid #1e1e3a;
  }
  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    color: #555;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  /* Action buttons */
  .action-btn {
    width: 100%;
    padding: 10px;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    background: #1a1a2e;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    transition: all 0.15s;
  }
  .action-btn:hover {
    border-color: #a855f7;
    background: #a855f710;
  }
  .action-btn:active {
    transform: scale(0.98);
  }
  .action-btn.primary {
    background: #a855f7;
    border-color: #a855f7;
  }
  .action-btn.primary:hover {
    background: #9333ea;
  }
  .action-btn .icon { font-size: 16px; }
  .action-btn .label { flex: 1; text-align: left; }
  .action-btn .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    background: #a855f720;
    color: #a855f7;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: #111;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 700;
    color: #a855f7;
  }
  .stat-label {
    font-size: 10px;
    color: #666;
    margin-top: 2px;
  }

  /* Product list */
  .product-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid #1e1e3a;
  }
  .product-item:last-child { border: none; }
  .product-img {
    width: 36px;
    height: 36px;
    background: #2a2a4a;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name {
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .product-meta { font-size: 10px; color: #666; }
  .product-price { font-size: 12px; color: #22c55e; font-weight: 600; }

  /* Footer */
  .footer {
    padding: 10px 16px;
    text-align: center;
    font-size: 10px;
    color: #444;
  }
  .footer a { color: #a855f7; text-decoration: none; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #666;
  }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid #2a2a4a;
    border-top-color: #a855f7;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    transform: translateY(100px);
    transition: transform 0.2s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); }
  .toast.success { border-color: #22c55e40; }
  .toast.error { border-color: #ef444440; }

  /* Connect form */
  .connect-form { display: none; }
  .connect-form.show { display: block; }
  .form-input {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    padding: 8px 10px;
    color: #fff;
    font-size: 12px;
    margin-bottom: 8px;
  }
  .form-input:focus { outline: none; border-color: #a855f7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">⚡ LuminexLabs</div>
  <div class="header-sub">TikTok Affiliate Assistant</div>
</div>

<!-- Connection Status -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <div class="status-text" id="statusText">กำลังเชื่อมต่อ...</div>
  <div class="status-time" id="statusTime"></div>
</div>

<!-- Quick Actions -->
<div class="section">
  <div class="section-title">ดำเนินการ</div>

  <button class="action-btn primary" id="btnScrapePage">
    <span class="icon">🔍</span>
    <span class="label">ดึงข้อมูลจากหน้านี้</span>
  </button>

  <button class="action-btn" id="btnConnect">
    <span class="icon">🔗</span>
    <span class="label">เชื่อมต่อ TikTok</span>
    <span class="badge">ใหม่</span>
  </button>

  <button class="action-btn" id="btnRefreshData">
    <span class="icon">🔄</span>
    <span class="label">รีเฟรชข้อมูล</span>
  </button>
</div>

<!-- Stats Summary -->
<div class="section">
  <div class="section-title">สรุปวันนี้</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="statCommission">฿0</div>
      <div class="stat-label">Commission</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statOrders">0</div>
      <div class="stat-label">Orders</div>
    </div>
  </div>
</div>

<!-- Recent Products -->
<div class="section">
  <div class="section-title">สินค้าล่าสุด</div>
  <div id="productList">
    <div class="loading">
      <div class="spinner"></div>
      กำลังโหลด...
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <a href="#" id="openDashboard">เปิด Dashboard →</a>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
